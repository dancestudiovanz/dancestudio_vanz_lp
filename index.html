            "name": "まったく初めての参加ですが、大丈夫でしょうか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "はい、大歓迎です。キッズクラスも大人クラスも、当スタジオは「初めての方」「運動が苦手な方」が安心して一から馴染めるよう配慮してレッスンを進めています。講師がしっかり一人ひとりのペースに合わせたレッスンをおこないます。"
            }
          },
          {
            "@type": "Question",
            "name": "体験レッスンの時、持ち物や服装は何が必要ですか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "運動しやすい服装（Tシャツ、スウェットなど）でお越しください。また、水分補給用の飲み物（お水やスポーツドリンク）と、汗ふき用タオルをご持参ください。キッズダンスおよびエアロビクスは室内用のスニーカー、ヨガは裸足で行いますのでシューズは不要です。お持ちの方はヨガマットをご持参ください。"
            }
          },
          {
            "@type": "Question",
            "name": "発表会はお金がかかると聞いたのですが…衣装代などの負担が心配です。",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "当スタジオは「安心の低予算体制」を一番に掲げております。年2回開催する発表会の参加費や衣装代は、ご家族の負担にならないよう必要最小限に抑えています。衣装も手作り義務などは一切ありません。無理なく継続していただけるのがVANZの大きな強みです。"
            }
          },
          {
            "@type": "Question",
            "name": "人見知りがある子なのですが、クラスの雰囲気に馴染めるでしょうか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ご安心ください。指導歴30年の代表のchikaをはじめ、講師陣はお子さま一人ひとりの気持ちに寄り添うことを大切にしています。無理に参加を促すのではなく、まずは見学からでも大丈夫。小さな一歩をたくさん褒めながら、少しずつクラスに馴染めるようサポートします。誰ひとり置き去りにせず、「できた！」という経験を積み重ねることで、自然と笑顔で踊れるようになっていきます。"
            }
          },
          {
            "@type": "Question",
            "name": "スタジオの見学や、体験レッスンの日に子供と一緒にスタジオ内に入れますか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "はい、もちろんです！保護者様にはスタジオ内に用意された観覧スペースにて、お子様が楽しんでいる姿をゆっくり見学していただけます。"
            }
          },
          {
            "@type": "Question",
            "name": "月の途中から入会できますか？また、欠席した時の振替レッスンはありますか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "はい、月の途中からご入会いただけます。ただ振替レッスンはおこなっておりませんのでご了承ください。"
            }
          },

            "name": "月会費はどのようにお支払いすればよいですか？",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "月会費は、毎月27日にご指定の口座より翌月分をお引き落としさせていただきます。（27日が銀行休業日の場合は、翌営業日）"
            }
          },
          {
            "@type": "Question",
            "name": "キッズダンスは、引き落としではなくレッスンチケット購入で通えますか？",

            }
