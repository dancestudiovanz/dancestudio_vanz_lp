<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('styles'); ?>
  </head>
  <body>
    <div id="login-view">
      <div class="login-wrap">
        <h1>会員専用掲示板</h1>
        <p>パスワードを入力してお知らせ一覧を表示します。</p>
        <div id="error" class="login-error" role="alert"></div>
        <form id="loginForm">
          <label for="password">パスワード</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button id="submitBtn" type="submit">入室する</button>
        </form>
      </div>
    </div>

    <div id="board-app" style="display: none">
      <p class="empty-message">読み込み中...</p>
    </div>

    <script>
      (function () {
        var TOKEN_KEY = 'vanz_board_token';
        var currentToken = '';

        var loginView = document.getElementById('login-view');
        var boardApp = document.getElementById('board-app');
        var errorEl = document.getElementById('error');
        var submitBtn = document.getElementById('submitBtn');

        document.getElementById('loginForm').addEventListener('submit', function (event) {
          event.preventDefault();
          var password = document.getElementById('password').value;

          errorEl.textContent = '';
          submitBtn.disabled = true;

          google.script.run
            .withSuccessHandler(function (result) {
              submitBtn.disabled = false;
              if (!result || !result.ok) {
                errorEl.textContent = (result && result.message) || 'ログインに失敗しました。';
                return;
              }
              sessionStorage.setItem(TOKEN_KEY, result.token);
              loadBoard(result.token, 1);
            })
            .withFailureHandler(function (err) {
              submitBtn.disabled = false;
              errorEl.textContent = err.message || 'エラーが発生しました。';
            })
            .loginMember(password);
        });

        var params = new URLSearchParams(window.location.search);
        var urlToken = params.get('token');
        var urlPage = Number(params.get('page')) || 1;
        if (urlToken) {
          loadBoard(urlToken, urlPage);
        } else {
          sessionStorage.removeItem(TOKEN_KEY);
        }

        function showLoginView(message) {
          loginView.style.display = 'block';
          boardApp.style.display = 'none';
          if (message) {
            errorEl.textContent = message;
          }
        }

        function showBoardView() {
          loginView.style.display = 'none';
          boardApp.style.display = 'block';
          boardApp.innerHTML = '<p class="empty-message">読み込み中...</p>';
        }

        function loadBoard(token, page) {
          currentToken = token;
          showBoardView();

          google.script.run
            .withSuccessHandler(function (result) {
              if (!result || !result.ok) {
                sessionStorage.removeItem(TOKEN_KEY);
                showLoginView((result && result.message) || 'セッションが無効です。再度ログインしてください。');
                return;
              }
              sessionStorage.setItem(TOKEN_KEY, token);
              renderBoard(boardApp, result.model);
              bindAccordion(boardApp);
              bindPagination(boardApp);
            })
            .withFailureHandler(function (err) {
              showLoginView(err.message || '読み込みに失敗しました。');
            })
            .getBoardViewData(token, page);
        }

        function renderBoard(root, model) {
          var html = '';
          html += '<header class="board-header">';
          html += '<h1 class="board-title">お知らせ一覧</h1>';
          html +=
            '<span class="board-count">' +
            model.total +
            '件中 ' +
            model.rangeLabel +
            ' を表示</span>';
          html += '</header>';

          if (model.total === 0) {
            html += '<p class="empty-message">お知らせはまだありません。</p>';
          } else {
            html += '<div class="post-list">';
            for (var i = 0; i < model.posts.length; i++) {
              var post = model.posts[i];
              var bodyId = 'body-' + post.rowIndex;
              html += '<article class="post-card">';
              html += '<div class="post-summary" data-target="' + bodyId + '">';
              html += '<span class="post-date">' + (post.postDate || '—') + '</span>';
              html += '<div class="post-badges">';
              if (post.category) {
                html += badgeHtml('category', post.category);
              }
              if (post.weekday) {
                html += badgeHtml('weekday', post.weekday);
              }
              if (post.className) {
                html += badgeHtml('class', post.className);
              }
              html += '</div>';
              html += '<div class="post-title">' + post.title + '</div>';
              html +=
                '<button type="button" class="toggle-btn" aria-label="詳細を表示" data-target="' +
                bodyId +
                '">+</button>';
              html += '</div>';
              html += '<div id="' + bodyId + '" class="post-detail">';
              if (post.bodyHtml) {
                html += '<div class="post-body-text">' + post.bodyHtml + '</div>';
              }
              if (post.imageUrls && post.imageUrls.length > 0) {
                html += '<div class="post-images">';
                for (var j = 0; j < post.imageUrls.length; j++) {
                  var imgUrl = escapeAttr(post.imageUrls[j]);
                  html +=
                    '<a href="' +
                    imgUrl +
                    '" target="_blank" rel="noopener noreferrer">' +
                    '<img src="' +
                    imgUrl +
                    '" alt="" loading="lazy" /></a>';
                }
                html += '</div>';
              }
              html += '</div></article>';
            }
            html += '</div>';

            html += '<nav class="pagination" aria-label="ページ送り">';
            if (model.page <= 1) {
              html += '<span class="disabled">« 先頭</span>';
            } else {
              html += '<a href="#" data-page="1">« 先頭</a>';
            }
            if (!model.hasNext) {
              html += '<span class="disabled">次</span>';
            } else {
              html += '<a href="#" data-page="' + model.nextPage + '">次</a>';
            }
            if (model.page >= model.lastPage) {
              html += '<span class="disabled">最後 »</span>';
            } else {
              html += '<a href="#" data-page="' + model.lastPage + '">最後 »</a>';
            }
            html += '</nav>';
          }

          root.innerHTML = html;
        }

        function badgeHtml(type, label) {
          var slug = String(label)
            .toLowerCase()
            .replace(/[^a-z0-9\u3040-\u30ff\u3400-\u9fff]+/g, '-');
          return (
            '<span class="badge badge-' +
            type +
            ' badge-' +
            type +
            '-' +
            slug +
            '">' +
            label +
            '</span>'
          );
        }

        function bindPagination(root) {
          root.querySelectorAll('.pagination a[data-page]').forEach(function (link) {
            link.addEventListener('click', function (event) {
              event.preventDefault();
              var page = Number(link.getAttribute('data-page')) || 1;
              loadBoard(currentToken, page);
            });
          });
        }

        function escapeAttr(text) {
          return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        function bindAccordion(root) {
          function toggleBody(id) {
            var body = root.querySelector('#' + id);
            var btn = root.querySelector('.toggle-btn[data-target="' + id + '"]');
            if (!body || !btn) return;
            var open = body.classList.toggle('open');
            btn.textContent = open ? '−' : '+';
            btn.setAttribute('aria-label', open ? '詳細を閉じる' : '詳細を表示');
            if (open) {
              body.previousElementSibling.classList.add('open');
            } else {
              body.previousElementSibling.classList.remove('open');
            }
          }

          root.querySelectorAll('.post-summary').forEach(function (row) {
            row.addEventListener('click', function (event) {
              if (event.target.classList.contains('toggle-btn')) return;
              toggleBody(row.getAttribute('data-target'));
            });
          });

          root.querySelectorAll('.toggle-btn').forEach(function (btn) {
            btn.addEventListener('click', function (event) {
              event.stopPropagation();
              toggleBody(btn.getAttribute('data-target'));
            });
          });
        }
      })();
    </script>
  </body>
</html>
