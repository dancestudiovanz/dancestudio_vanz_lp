<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <?!= include('styles'); ?>
  </head>
  <body>
    <div id="board-app">
      <p class="empty-message">読み込み中...</p>
    </div>

    <script>
      (function () {
        var TOKEN_KEY = 'vanz_board_token';
        var params = new URLSearchParams(window.location.search);
        var token = params.get('token') || '';
        var page = Number(params.get('page')) || 1;
        var app = document.getElementById('board-app');

        if (!token) {
          app.innerHTML =
            '<p class="login-error">セッションがありません。<a href="?">ログイン画面へ</a></p>';
          return;
        }

        google.script.run
          .withSuccessHandler(function (result) {
            if (!result || !result.ok) {
              sessionStorage.removeItem(TOKEN_KEY);
              app.innerHTML =
                '<p class="login-error">' +
                ((result && result.message) || 'セッションが無効です。') +
                ' <a href="?">ログイン画面へ</a></p>';
              return;
            }
            sessionStorage.setItem(TOKEN_KEY, token);
            renderBoard(app, result.model);
            bindAccordion(app);
          })
          .withFailureHandler(function (err) {
            app.innerHTML =
              '<p class="login-error">' +
              (err.message || '読み込みに失敗しました。') +
              '</p>';
          })
          .getBoardViewData(token, page);

        function renderBoard(root, model) {
          var html = '';
          html += '<header class="board-header">';
          html += '<h1 class="board-title">お知らせ一覧</h1>';
          html +=
            '<span class="board-count">' +
            model.total +
            '件中 ' +
            model.rangeLabel +
            ' を表示</span>';
          html += '</header>';

          if (model.total === 0) {
            html += '<p class="empty-message">お知らせはまだありません。</p>';
          } else {
            html += '<ul class="post-list">';
            for (var i = 0; i < model.posts.length; i++) {
              var post = model.posts[i];
              var bodyId = 'body-' + post.id;
              html += '<li class="post-item">';
              html += '<div class="post-row" data-target="' + bodyId + '">';
              html += '<div class="post-title">' + post.title;
              html += '<span class="post-date">(' + post.createdAt + ')</span></div>';
              html +=
                '<button type="button" class="toggle-btn" aria-label="詳細を表示" data-target="' +
                bodyId +
                '">+</button>';
              html += '</div>';
              html += '<div id="' + bodyId + '" class="post-body">';
              if (post.bodyHtml) {
                html += '<div>' + post.bodyHtml + '</div>';
              }
              if (post.imageUrls && post.imageUrls.length > 0) {
                html += '<div class="post-images">';
                for (var j = 0; j < post.imageUrls.length; j++) {
                  var imgUrl = escapeAttr(post.imageUrls[j]);
                  html +=
                    '<a href="' +
                    imgUrl +
                    '" target="_blank" rel="noopener noreferrer">' +
                    '<img src="' +
                    imgUrl +
                    '" alt="" loading="lazy" /></a>';
                }
                html += '</div>';
              }
              html += '</div></li>';
            }
            html += '</ul>';

            var tokenEnc = model.tokenEncoded;
            html += '<nav class="pagination" aria-label="ページ送り">';
            if (model.page <= 1) {
              html += '<span class="disabled">« 先頭</span>';
            } else {
              html += '<a href="?token=' + tokenEnc + '&amp;page=1">« 先頭</a>';
            }
            if (!model.hasNext) {
              html += '<span class="disabled">次</span>';
            } else {
              html +=
                '<a href="?token=' + tokenEnc + '&amp;page=' + model.nextPage + '">次</a>';
            }
            if (model.page >= model.lastPage) {
              html += '<span class="disabled">最後 »</span>';
            } else {
              html +=
                '<a href="?token=' + tokenEnc + '&amp;page=' + model.lastPage + '">最後 »</a>';
            }
            html += '</nav>';
          }

          root.innerHTML = html;
        }

        function escapeAttr(text) {
          return String(text || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
        }

        function bindAccordion(root) {
          function toggleBody(id) {
            var body = root.querySelector('#' + id);
            var btn = root.querySelector('.toggle-btn[data-target="' + id + '"]');
            if (!body || !btn) return;
            var open = body.classList.toggle('open');
            btn.textContent = open ? '−' : '+';
            btn.setAttribute('aria-label', open ? '詳細を閉じる' : '詳細を表示');
          }

          root.querySelectorAll('.post-row').forEach(function (row) {
            row.addEventListener('click', function (event) {
              if (event.target.classList.contains('toggle-btn')) return;
              toggleBody(row.getAttribute('data-target'));
            });
          });

          root.querySelectorAll('.toggle-btn').forEach(function (btn) {
            btn.addEventListener('click', function (event) {
              event.stopPropagation();
              toggleBody(btn.getAttribute('data-target'));
            });
          });
        }
      })();
    </script>
  </body>
</html>
