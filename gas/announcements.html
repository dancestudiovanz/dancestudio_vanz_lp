<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light;
        --rose: #f43f5e;
        --rose-soft: #fff1f2;
        --slate-50: #f8fafc;
        --slate-100: #f1f5f9;
        --slate-500: #64748b;
        --slate-600: #475569;
        --slate-900: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--slate-50);
        color: var(--slate-900);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        max-width: 760px;
        margin: 0 auto;
        padding: 28px 16px 40px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        border: 1px solid #ffe4e6;
        border-radius: 999px;
        background: var(--rose-soft);
        color: var(--rose);
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 900;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: clamp(28px, 8vw, 40px);
        line-height: 1.15;
        letter-spacing: -0.04em;
      }

      .lead {
        margin: 0 0 24px;
        color: var(--slate-500);
        font-size: 14px;
        line-height: 1.8;
        font-weight: 600;
      }

      .list {
        display: grid;
        gap: 14px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .card {
        border: 1px solid #e2e8f0;
        border-radius: 22px;
        background: #fff;
        padding: 20px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
      }

      .date {
        color: var(--rose);
        font-size: 12px;
        font-weight: 900;
      }

      .title {
        margin: 8px 0 0;
        font-size: 18px;
        line-height: 1.45;
        font-weight: 900;
      }

      .body {
        margin: 10px 0 0;
        color: var(--slate-600);
        font-size: 14px;
        line-height: 1.9;
        white-space: pre-wrap;
      }

      .empty,
      .error {
        border-radius: 18px;
        background: #fff;
        border: 1px solid #e2e8f0;
        padding: 20px;
        color: var(--slate-500);
        font-weight: 700;
        line-height: 1.7;
      }

      .error {
        color: #be123c;
        background: #fff1f2;
        border-color: #fecdd3;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <span class="eyebrow">VANZからのおしらせ</span>
      <h1>最新情報</h1>
      <p class="lead">休講・イベント・体験レッスンなど、dancestudio VANZからのおしらせを掲載します。</p>

      <? var items = getPublicAnnouncements(); ?>
      <? if (!items || items.length === 0) { ?>
        <p class="empty">現在、おしらせはありません。</p>
      <? } else { ?>
        <ul class="list">
          <? for (var i = 0; i < items.length; i++) { ?>
            <? var item = items[i]; ?>
            <li class="card">
              <? if (item.date) { ?>
                <div class="date"><?= item.date ?></div>
              <? } ?>
              <h2 class="title"><?= item.title ?></h2>
              <? if (item.body) { ?>
                <p class="body"><?= item.body ?></p>
              <? } ?>
            </li>
          <? } ?>
        </ul>
      <? } ?>
    </main>
  </body>
</html>
